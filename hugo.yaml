baseURL: "https://orazioscicolone.it"
languageCode: "en-us"
title: "Orazio Scicolone"
theme: hugo-profile

outputs:
  home:
    - "HTML"
    - "RSS"
    - "JSON"
  page:
    - "HTML"
    - "RSS"

enableRobotsTXT: true

pagination:
  pagerSize: 6

markup:
  goldmark:
    renderer:
      unsafe: true

params:
  title: "Orazio Scicolone"
  description: "Software Developer — Full-Stack, Android, Bioinformatics"
  favicon: "/img/avatar.jpg"

  useBootstrapCDN: false
  animate: true

  theme:
    defaultTheme: "dark"

  font:
    fontSize: 1rem
    fontWeight: 400
    lineHeight: 1.5
    textAlign: left

  color:
    primaryColor: "#4f8ef7"
    darkmode:
      primaryColor: "#64b5f6"

  navbar:
    align: ms-auto
    brandName: "Orazio Scicolone"
    disableSearch: true
    stickyNavBar:
      enable: true
      showOnScrollUp: true
    enableSeparator: false
    menus:
      disableAbout: false
      disableExperience: false
      disableEducation: false
      disableProjects: false
      disableAchievements: true
      disableContact: false

  # Hero
  hero:
    enable: true
    intro: "Hi, I am"
    title: "Orazio Scicolone."
    subtitle: "Software Developer"
    content: |
      Full-Stack developer with a background in Computer Engineering. Passionate about building
      web platforms, mobile apps, and open-source tools. Currently based in Sophia Antipolis, France.
    image: /img/avatar.jpg
    roundImage: true
    bottomImage:
      enable: true
    button:
      enable: false
    socialLinks:
      fontAwesomeIcons:
        - icon: fab fa-github
          url: https://github.com/skiwithuge
        - icon: fab fa-linkedin
          url: https://www.linkedin.com/in/orazio-scicolone-16235169/
        - icon: fab fa-twitter
          url: https://twitter.com/Zio123

  # About
  about:
    enable: true
    title: "About Me"
    image: "/img/avatar.jpg"
    content: |-
      I am a software developer with a Master's Degree in Computer Engineering from Politecnico di Torino (Italy).
      My journey spans from early web experiments in 2006 to professional work at companies like Amadeus, Telemaque, and WildMoka.

      I have a broad skill set — from low-level C++ and bioinformatics tools, to Android apps,
      full-stack web development with Python and Node.js, and AI voice skills with Alexa.
    skills:
      enable: true
      title: "Technologies I work with:"
      items:
        - "Python"
        - "Node.js"
        - "JavaScript"
        - "C++"
        - "Android"
        - "Bash"
        - "R"
        - "SQL"
        - "Docker"
        - "Git"
        - "Linux"
        - "Java"

  # Experience
  experience:
    enable: true
    items:
      - company: "WildMoka"
        companyUrl: "https://www.wildmoka.com"
        jobs:
          - name: "Fullstack Developer"
            date: "Feb 2020 - Present"
            content: |
              Fullstack developer on the WildMoka Platform for automated video production and live streaming.

              - Backend services with Python and Node.js
              - Frontend features in JavaScript
              - Platform integrations and API development

      - company: "Telemaque"
        jobs:
          - name: "Android Developer"
            date: "Sep 2019 - Dec 2019"
            content: |
              Developed Android applications for an enterprise mobile product.

              - Native Android development (Java/Kotlin)
              - Integration with REST APIs

      - company: "Amadeus IT Group"
        companyUrl: "https://amadeus.com"
        jobs:
          - name: "Software Developer"
            date: "Jan 2018 - Aug 2019"
            content: |
              Development of the Rail ticketing platform.

              - C++ backend development for high-performance reservation systems
              - Python scripting and tooling
              - Collaborative Agile environment with international teams

      - company: "Politecnico di Torino"
        companyUrl: "https://www.polito.it"
        jobs:
          - name: "Bioinformatics Research Fellow"
            date: "Feb 2017 - Dec 2017"
            content: |
              Conducted research in bioinformatics, producing two published tools:

              - **GeneEx** — Differential expression analysis tool ([paper](http://www.scitepress.org/PublicationsDetail.aspx?ID=ZaT7yr1Kba8=&t=1)) — R
              - **BioSeqZip** — NGS redundant reads collapser ([PubMed](https://pubmed.ncbi.nlm.nih.gov/31999333/)) — C++
              - Coursera Machine Learning Certificate (2017)
              - Participated in Droidcon Hackathon 2017

  # Education
  education:
    enable: true
    index: false
    items:
      - title: "Master's Degree in Computer Engineering"
        school:
          name: "Politecnico di Torino"
          url: "https://www.polito.it"
        date: "2013 - 2016"
        content: |-
          Graduated with a focus on software systems and algorithms.
          Thesis in Bioinformatics: pairwise alignment scoring analysis.

      - title: "Bachelor's Degree in Computer Engineering"
        school:
          name: "Università degli Studi di Palermo"
          url: "https://www.unipa.it"
        date: "2009 - 2013"
        content: |-
          Foundation in computer science, algorithms, databases, and software engineering.
          Early web and mobile application experiments during studies.

  # Projects
  projects:
    enable: true
    items:
      - title: "EnviMove"
        content: "Unofficial, ad-free and open-source Android app for the Antibes Envibus public transport company. Includes real-time schedules and route planning."
        image: /img/enviMove1.png
        badges:
          - "Android"
          - "Python"
        links:
          - icon: fab fa-github
            url: https://github.com/skiwithuge

      - title: "CosaVisitare"
        content: "Alexa voice skill to discover what to visit and do in a selected Italian city. Built with Python and the Alexa Developer Kit."
        badges:
          - "Python"
          - "Alexa SDK"

      - title: "BioSeqZip"
        content: "High-performance tool to collapse redundant reads in NGS datasets. Published in Bioinformatics (Oxford). Written in C++."
        badges:
          - "C++"
          - "Bioinformatics"
        links:
          - icon: fa fa-external-link
            url: https://pubmed.ncbi.nlm.nih.gov/31999333/

      - title: "GeneEx"
        content: "Differential expression analysis tool for RNA-seq data, presented at SCITEPRESS conference. Written in R."
        badges:
          - "R"
          - "Bioinformatics"
        links:
          - icon: fa fa-external-link
            url: http://www.scitepress.org/PublicationsDetail.aspx?ID=ZaT7yr1Kba8=&t=1

      - title: "Bioinformatics Testbench"
        content: "Testbench to analyze the quality of pairwise alignments. Includes tools to visualize scoring matrices and evaluate different scoring schemes."
        image: /img/msc1.png
        badges:
          - "C++"
          - "Python"
          - "Bash"

      - title: "Mobile Apps for Students"
        content: |
          Suite of Android apps for university students: **Lecture TimeTable**, **JobPlacement**, **IntectiveMap**, and **StudentLife** (marketplace + aggregator).
        badges:
          - "Android"
          - "Parse.com"

      - title: "University Portal — Unipablog"
        content: "First university web portal for Università degli Studi di Palermo. Built from scratch as a cooperation agreement project."
        badges:
          - "PHP"
          - "HTML"
          - "CSS"
        links:
          - icon: fab fa-youtube
            url: https://www.youtube.com/watch?v=g20MERlDGPE

      - title: "WorldTour Interface"
        content: "Frontend interface for a geo-located image web system with Google Maps integration."
        image: /img/wt1.png
        badges:
          - "Java"
          - "JSP"
          - "jQuery"
          - "GMaps API"

      - title: "Online Auctions"
        content: "Development and implementation of a fully functional online auction web site."
        image: /img/bid1.png
        badges:
          - "PHP"
          - "jQuery"
          - "MySQL"

      - title: "Airport Management"
        content: "Client/Server application for the management of flights and airport operations, using web services."
        image: /img/air2.png
        badges:
          - "Java"
          - "XML"
          - "WSDL 1.1"

      - title: "SmsViewer & oCellManager"
        content: "Apps developed in mShell (Symbian OS) to visualize SMS conversations and manage incoming/outgoing messages."
        badges:
          - "mShell"
          - "Symbian OS"

      - title: "PHP Download System"
        content: "System to share and manage external links of hosting sites, built in 2007 as one of the first web projects."
        image: /img/hod1.png
        badges:
          - "PHP"
          - "MySQL"

  # Contact
  contact:
    enable: true
    title: "Contact Me"
    content: "My inbox is always open. Whether you have a question or just want to say hi, I'll do my best to reply!"
    btnName: "Send Email"
    formspree:
      enable: true
      formId: "xeerqjyq"

  footer:
    recentPosts:
      path: "blogs"
      count: 3
      title: Recent Posts
      enable: false
      disableFeaturedImage: false
    socialNetworks:
      github: https://github.com/skiwithuge
      linkedin: https://www.linkedin.com/in/orazio-scicolone-16235169/
      twitter: https://twitter.com/Zio123
      facebook: https://www.facebook.com/oscicolone

  listPages:
    disableFeaturedImage: false

  singlePages:
    socialShare: true
    readTime:
      enable: true
      content: "min read"
    scrollprogress:
      enable: true
    tags:
      openInNewTab: true
